  <!-- Latitude lines -->
  <path d="M20 28 Q40 21 60 28" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M20 52 Q40 59 60 52" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
