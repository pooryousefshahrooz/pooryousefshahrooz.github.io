<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" rx="16" fill="#1d4ed8"/>
  <!-- Central nucleus -->
  <circle cx="40" cy="40" r="6" fill="white"/>
  <!-- Three orbital ellipses at 0°, 60°, 120° -->
  <ellipse cx="40" cy="40" rx="23" ry="8"
           fill="none" stroke="white" stroke-width="2" opacity="0.85"/>
  <ellipse cx="40" cy="40" rx="23" ry="8"
           fill="none" stroke="white" stroke-width="2" opacity="0.85"
           transform="rotate(60 40 40)"/>
  <ellipse cx="40" cy="40" rx="23" ry="8"
           fill="none" stroke="white" stroke-width="2" opacity="0.85"
           transform="rotate(120 40 40)"/>
</svg>
