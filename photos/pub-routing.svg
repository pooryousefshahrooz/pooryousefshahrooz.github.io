<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" rx="16" fill="#0891b2"/>
  <!-- Four nodes -->
  <circle cx="40" cy="16" r="7" fill="white" opacity="0.9"/>
  <circle cx="16" cy="52" r="7" fill="white" opacity="0.9"/>
  <circle cx="64" cy="52" r="7" fill="white" opacity="0.9"/>
  <circle cx="40" cy="40" r="5" fill="white" opacity="0.65"/>
  <!-- Edges from center to leaves -->
  <line x1="40" y1="23" x2="40" y2="35" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="36" y1="43" x2="22" y2="48" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="44" y1="43" x2="58" y2="48" stroke="white" stroke-width="2" opacity="0.6"/>
  <!-- Bottom edge -->
  <line x1="23" y1="54" x2="57" y2="54" stroke="white" stroke-width="2" opacity="0.4"/>
</svg>
