  <!-- Lines (text representation) -->
  <line x1="24" y1="30" x2="56" y2="30" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="37" x2="48" y2="37" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="44" x2="52" y2="44" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

