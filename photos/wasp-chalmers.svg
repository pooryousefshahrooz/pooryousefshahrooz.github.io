<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Background (Swedish dark blue) -->
  <rect width="80" height="80" rx="16" fill="#1e3a8a"/>

  <!-- Swedish cross / flag cross (yellow/gold) -->
  <rect x="10" y="34" width="60" height="12" rx="2" fill="#fbbf24" opacity="0.9"/>
  <rect x="30" y="10" width="12" height="60" rx="2" fill="#fbbf24" opacity="0.9"/>

  <!-- Subtle overlay to reduce intensity -->
  <rect width="80" height="80" rx="16" fill="#1e3a8a" opacity="0.3"/>

  <!-- Cap silhouette on top -->
  <rect x="22" y="27" width="36" height="6" rx="2" fill="white" opacity="0.92"/>
  <polygon points="40,20 20,33 60,33" fill="white" opacity="0.85"/>
  <rect x="36" y="20" width="8" height="2" rx="1" fill="white" opacity="0.8"/>
</svg>
